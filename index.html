<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Surebets</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--raised:#1c2330;--inp:#1a2233;
  --border:#2a3548;--focus:#3d8bff;
  --green:#00d97e;--gdim:rgba(0,217,126,.12);--gglow:rgba(0,217,126,.22);
  --red:#ff5f5f;--rdim:rgba(255,95,95,.1);
  --yellow:#f0b429;--ydim:rgba(240,180,41,.12);
  --blue:#58a6ff;--bdim:rgba(88,166,255,.1);
  --text:#e6edf3;--muted:#7d8fa8;--faint:#4a5a72;
  --r:10px;--sw:210px;--mono:'JetBrains Mono','Fira Code',monospace;--t:.16s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow-x:hidden}
input,button,select,textarea{font-family:inherit}
button{cursor:pointer;border:none;background:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── LAYOUT ── */
.app{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:100;
  transition:transform var(--t)}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sb-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-sub{font-size:11px;color:var(--faint);margin-top:1px}
.nav{padding:8px 6px;flex:1}
.ni{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;user-select:none;
  transition:background var(--t),color var(--t);position:relative}
.ni:hover{background:var(--raised);color:var(--text)}
.ni.active{background:var(--gdim);color:var(--green)}
.ni.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 3px 3px 0;background:var(--green)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nb{margin-left:auto;background:var(--raised);border:1px solid var(--border);
  color:var(--faint);font-size:10px;font-weight:600;padding:1px 6px;
  border-radius:99px;min-width:20px;text-align:center}
.ni.active .nb{background:var(--gdim);border-color:rgba(0,217,126,.3);color:var(--green)}
.sb-toggle{display:none;position:fixed;top:13px;left:13px;z-index:200;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px;color:var(--text)}
.sb-toggle svg{width:17px;height:17px;display:block}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ph{padding:16px 24px 12px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.ph-title{font-size:18px;font-weight:700;letter-spacing:-.4px}
.ph-sub{font-size:11.5px;color:var(--faint);margin-top:1px}
.pb{flex:1;overflow-y:auto;padding:20px 24px;display:grid;
  grid-template-columns:1fr 345px;gap:16px;align-content:start}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ch{padding:13px 17px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.ct{font-size:14px;font-weight:600}
.cb{padding:17px}

/* ── INPUTS ── */
.fl{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--faint);margin-bottom:5px}
input[type=number],input[type=text],select{
  width:100%;background:var(--inp);border:1px solid var(--border);
  border-radius:7px;padding:8px 11px;color:var(--text);font-size:14px;
  outline:none;transition:border-color var(--t),box-shadow var(--t)}
input:focus,select:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(61,139,255,.13)}
.iw{position:relative;display:flex;align-items:center}
.isuf{position:absolute;right:10px;color:var(--faint);font-size:12px;pointer-events:none}
.ii{font-size:16px;font-weight:600;text-align:right;padding-right:26px!important}

/* ── OUTCOMES ── */
.oh{display:grid;grid-template-columns:1fr 1fr 100px 32px;gap:6px;margin-bottom:6px}
.cl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);padding:0 3px}
.or{display:grid;grid-template-columns:1fr 1fr 100px 32px;gap:6px;
  margin-bottom:6px;align-items:center;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.oi{text-align:right;font-family:var(--mono);font-size:15px;font-weight:600}
.oi.lit{border-color:var(--green);box-shadow:0 0 0 3px var(--gglow)}
.bd{width:32px;height:32px;display:grid;place-items:center;border-radius:7px;
  color:var(--faint);border:1px solid transparent;transition:all var(--t);flex-shrink:0}
.bd:hover{background:var(--rdim);color:var(--red);border-color:rgba(255,95,95,.3)}
.bd svg{width:13px;height:13px}
.ba{display:flex;align-items:center;gap:5px;margin-top:7px;padding:6px 10px;
  border-radius:7px;border:1px dashed var(--border);color:var(--muted);
  font-size:13px;font-weight:500;transition:all var(--t);width:100%}
.ba:hover{border-color:var(--green);color:var(--green);background:var(--gdim)}
.ba svg{width:13px;height:13px}

/* ── ROUNDING ── */
.rs{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.rh{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:9px;
  display:flex;align-items:center;gap:5px}
.rh svg{width:12px;height:12px;color:var(--green)}
.rp{display:flex;gap:5px;flex-wrap:wrap}
.rpb{padding:4px 11px;border-radius:6px;border:1px solid var(--border);
  background:var(--inp);color:var(--muted);font-size:12px;font-weight:500;
  font-family:var(--mono);transition:all var(--t)}
.rpb:hover{border-color:var(--focus);color:var(--text)}
.rpb.active{border-color:var(--green);background:var(--gdim);color:var(--green)}
.cr{display:flex;align-items:center;gap:7px;margin-top:8px;
  font-size:12px;color:var(--muted)}
.cr input{width:75px;padding:5px 8px!important;font-size:12px!important;font-family:var(--mono)!important}

/* ── RESULT PANEL ── */
.rp2{display:flex;flex-direction:column;gap:12px}
.ph2{background:var(--raised);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 16px;text-align:center;position:relative;overflow:hidden}
.ph2::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--gglow) 0%,transparent 65%);
  pointer-events:none;opacity:0;transition:opacity .4s ease}
.ph2.sb::after{opacity:1}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:20px;font-size:10.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.bg{background:var(--gdim);border:1px solid rgba(0,217,126,.3);color:var(--green)}
.br{background:var(--rdim);border:1px solid rgba(255,95,95,.3);color:var(--red)}
.badge svg{width:11px;height:11px}
.pp{font-size:40px;font-weight:800;letter-spacing:-2px;line-height:1;
  font-family:var(--mono);margin-bottom:4px}
.pp.pos{color:var(--green)}.pp.neg{color:var(--red)}
.ps{font-size:12.5px;color:var(--muted)}
.ps .hi{font-weight:600}
.ps .hi.pos{color:var(--green)}.ps .hi.neg{color:var(--red)}
.bkr{display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 17px;border-bottom:1px solid var(--border);gap:9px}
.bkr:last-child{border-bottom:none}
.bkn{font-size:13px;font-weight:600}
.bks{font-size:11px;color:var(--faint);margin-top:1px}
.bkv{text-align:right;flex-shrink:0}
.bkst{font-size:14px;font-weight:700;font-family:var(--mono)}
.bkr2{font-size:11px;color:var(--muted);margin-top:1px}
.bkm{font-size:10.5px;margin-top:2px;color:var(--yellow);font-family:var(--mono);font-weight:600}
.sr{display:flex;justify-content:space-between;align-items:center;
  padding:8px 17px;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sl{font-size:12px;color:var(--muted)}
.sv{font-size:13px;font-weight:600;font-family:var(--mono)}
.sv.pos{color:var(--green)}.sv.neg{color:var(--red)}
.pw{padding:11px 17px 12px;border-top:1px solid var(--border)}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);margin-bottom:4px}
.pt{height:4px;background:var(--inp);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:var(--green);transition:width .4s,background .3s}
.pf.over{background:var(--red)}
.btn-reg{display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:10px;border-radius:8px;
  background:var(--gdim);border:1px solid rgba(0,217,126,.35);
  color:var(--green);font-size:13px;font-weight:600;transition:all var(--t)}
.btn-reg:hover{background:rgba(0,217,126,.2);box-shadow:0 0 0 3px var(--gglow)}
.btn-reg:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-reg svg{width:14px;height:14px}
.empty{padding:34px 16px;text-align:center;color:var(--faint)}
.empty svg{width:32px;height:32px;margin-bottom:9px;opacity:.35}
.empty p{font-size:13px}

/* ═══════════════ FULL-WIDTH PAGES ═══════════════ */
.fw{grid-column:1/-1;display:flex;flex-direction:column;gap:14px}

/* stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sc{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 15px}
.sl2{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.sv2{font-size:22px;font-weight:800;letter-spacing:-1px;font-family:var(--mono)}
.sv2.pos{color:var(--green)}.sv2.neg{color:var(--red)}.sv2.yel{color:var(--yellow)}

/* toolbar */
.tb{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.tb input[type=text]{max-width:220px;flex:1}
.btn-s{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:7px;
  border:1px solid var(--border);background:var(--inp);
  color:var(--muted);font-size:12.5px;font-weight:500;transition:all var(--t)}
.btn-s:hover{border-color:var(--focus);color:var(--text)}
.btn-s svg{width:13px;height:13px}
.btn-d{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:7px;
  border:1px solid rgba(255,95,95,.3);background:var(--rdim);
  color:var(--red);font-size:12.5px;font-weight:500;transition:all var(--t)}
.btn-d:hover{background:rgba(255,95,95,.18)}
.btn-d svg{width:13px;height:13px}

/* ── SUREBET HISTORY ITEMS ── */
.bi{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;animation:fi .2s ease}
.bih{padding:11px 15px;display:flex;align-items:flex-start;
  justify-content:space-between;border-bottom:1px solid var(--border);gap:9px}
.bie{font-size:13.5px;font-weight:600}
.bid{font-size:11px;color:var(--faint);margin-top:1px}
.bim{display:flex;align-items:center;gap:7px;flex-shrink:0}
.pp2{padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono)}
.pp2.pos{background:var(--gdim);color:var(--green);border:1px solid rgba(0,217,126,.25)}
.pp2.neg{background:var(--rdim);color:var(--red);border:1px solid rgba(255,95,95,.2)}
.ss{background:var(--inp);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-size:12px;padding:3px 7px;outline:none;cursor:pointer}
.bd2{width:26px;height:26px;display:grid;place-items:center;border-radius:5px;
  color:var(--faint);border:1px solid transparent;transition:all var(--t);flex-shrink:0}
.bd2:hover{background:var(--rdim);color:var(--red);border-color:rgba(255,95,95,.3)}
.bd2 svg{width:12px;height:12px}
.bl{padding:0}
.leg{display:grid;grid-template-columns:1fr 1fr auto auto auto auto;
  gap:5px 10px;padding:8px 15px;border-bottom:1px solid var(--border);
  align-items:center;font-size:12.5px}
.leg:last-child{border-bottom:none}
.lh{font-weight:600}.lr{color:var(--muted)}.lo{font-family:var(--mono);font-weight:600;text-align:right}
.lk{font-family:var(--mono);font-weight:700;text-align:right}
.lm{font-family:var(--mono);font-size:11px;color:var(--yellow);font-weight:600;text-align:right;white-space:nowrap}
.bf{display:flex;justify-content:space-between;align-items:center;
  padding:8px 15px;background:var(--raised);font-size:12.5px}
.bfl{color:var(--muted)}
.bfr{font-family:var(--mono);font-weight:700}
.bfr.pos{color:var(--green)}.bfr.neg{color:var(--red)}

/* status badge */
.sb2{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.3px}
.sp{background:var(--ydim);color:var(--yellow);border:1px solid rgba(240,180,41,.3)}
.sw{background:var(--gdim);color:var(--green);border:1px solid rgba(0,217,126,.3)}
.sl3{background:var(--rdim);color:var(--red);border:1px solid rgba(255,95,95,.3)}

/* ── WINNER SELECTION ── */
.leg{position:relative}
.win-btn{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;
  font-size:10.5px;font-weight:600;cursor:pointer;transition:all var(--t);flex-shrink:0;
  background:var(--inp);border:1px solid var(--border);color:var(--faint)}
.win-btn:hover{border-color:var(--green);color:var(--green);background:var(--gdim)}
.win-btn.selected{background:var(--gdim);border-color:rgba(0,217,126,.5);color:var(--green)}
.win-btn svg{width:10px;height:10px}
.leg-winner{background:rgba(0,217,126,.04);border-left:2px solid var(--green)!important}
.real-profit-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 15px;background:rgba(0,217,126,.06);border-top:1px solid rgba(0,217,126,.15);
  font-size:12px}
.real-profit-label{color:var(--green);font-weight:600}
.real-profit-val{font-family:var(--mono);font-weight:700;color:var(--green)}

/* ── NORMAL / FREEBET ITEMS ── */
.ni2{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 15px;
  display:grid;grid-template-columns:1fr auto auto;gap:8px 12px;
  align-items:start;animation:fi .2s ease}
.ni2-left{min-width:0}
.ni2-ev{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni2-meta{font-size:11px;color:var(--faint);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.ni2-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;
  font-style:italic;padding:5px 8px;background:var(--raised);border-radius:5px;
  border-left:2px solid var(--border)}
.ni2-right{text-align:right;flex-shrink:0}
.ni2-pnl{font-size:16px;font-weight:700;font-family:var(--mono)}
.ni2-pnl.pos{color:var(--green)}.ni2-pnl.neg{color:var(--red)}.ni2-pnl.zer{color:var(--muted)}
.type-pill{display:inline-block;padding:2px 8px;border-radius:99px;
  font-size:10px;font-weight:600;letter-spacing:.3px;flex-shrink:0}
.tp-normal{background:var(--bdim);color:var(--blue);border:1px solid rgba(88,166,255,.25)}
.tp-freebet{background:var(--ydim);color:var(--yellow);border:1px solid rgba(240,180,41,.3)}
.tp-combi{background:rgba(148,103,189,.12);color:#9467bd;border:1px solid rgba(148,103,189,.3)}

/* ── PROFIT PAGE ── */
.month-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden}
.mc-head{padding:13px 17px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.mc-month{font-size:15px;font-weight:700}
.mc-total{font-size:16px;font-weight:800;font-family:var(--mono)}
.mc-total.pos{color:var(--green)}.mc-total.neg{color:var(--red)}
.mc-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 17px;border-bottom:1px solid var(--border);font-size:12.5px}
.mc-row:last-child{border-bottom:none}
.mc-cat{color:var(--muted)}
.mc-val{font-family:var(--mono);font-weight:600}
.mc-val.pos{color:var(--green)}.mc-val.neg{color:var(--red)}.mc-val.neu{color:var(--muted)}
.total-hero{background:var(--raised);border:1px solid var(--border);
  border-radius:var(--r);padding:28px 24px;text-align:center}
.th-label{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.th-val{font-size:48px;font-weight:900;letter-spacing:-3px;font-family:var(--mono)}
.th-val.pos{color:var(--green)}.th-val.neg{color:var(--red)}
.th-sub{display:flex;justify-content:center;gap:20px;margin-top:14px;flex-wrap:wrap}
.th-sub-item{text-align:center}
.th-sub-label{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.th-sub-val{font-size:16px;font-weight:700;font-family:var(--mono)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .pb{grid-template-columns:1fr;padding:13px}
  .rp2{order:-1}
  .stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-toggle{display:flex;align-items:center;justify-content:center}
  .sb-overlay.open{display:block}
  .ph{padding:12px 13px 10px 50px}
  .pb{padding:11px 9px;gap:11px}
  .oh,.or{grid-template-columns:1fr 1fr 86px 32px}
  .stats{grid-template-columns:1fr 1fr;gap:7px}
  .leg{grid-template-columns:1fr 1fr auto}
  .lm{display:none}
  .tb{gap:6px}
  .ni2{grid-template-columns:1fr auto}
}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;z-index:1000}
#authScreen.hidden{display:none}
.auth-box{display:flex;flex-direction:column;align-items:center;gap:18px;padding:32px;
  text-align:center}
.auth-title{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.auth-sub{font-size:13px;color:var(--muted);margin-top:-8px}
.auth-btn{display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;
  padding:14px 28px;border-radius:var(--r);transition:background var(--t),border-color var(--t)}
.auth-btn:hover{background:var(--raised);border-color:var(--focus)}
.auth-btn svg{width:20px;height:20px;flex-shrink:0}
.auth-status{font-size:12px;color:var(--faint)}
#appRoot{display:none}
#appRoot.ready{display:block}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box">
    <div class="auth-title">Surebets</div>
    <div class="auth-sub">Inicia sesión para acceder a tus datos</div>
    <button class="auth-btn" id="googleLoginBtn">

let outcomes=[{id:1,house:'Casa 1',result:'',odd:2.30},{id:2,house:'Casa 2',result:'',odd:1.90}];
let nextId=3,totalInv=100,roundMode='exact',customStep=0.1;

function roundStep(v,s){if(!s||!isFinite(s)||s<=0)return v;const f=1/s;return parseFloat((Math.round(v*f)/f).toPrecision(12))}
function applyRound(v){if(roundMode==='exact')return v;const s=roundMode==='custom'?customStep:parseFloat(roundMode);return roundStep(v,s)}
function fmt(n,d=2){return Number(n).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d})}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){if(!d)return '';const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`}
function sign(n){return n>0?'+':n<0?'':'';}

function calculate(){
  const valid=outcomes.filter(o=>o.odd>1);
  if(valid.length<2)return null;
  const probs=valid.map(o=>1/o.odd),sumP=probs.reduce((a,b)=>a+b,0);
  const raw=valid.map(o=>(totalInv/o.odd)/sumP);
  const rounded=raw.map(s=>applyRound(s));
  const actual=rounded.reduce((a,b)=>a+b,0);
  const returns=valid.map((o,i)=>rounded[i]*o.odd);
  const minRet=Math.min(...returns);
  const profit=minRet-actual;
  return{valid,sumPct:sumP*100,isSurebet:sumP<1,stakes:rounded,returns,minReturn:minRet,actualTotal:actual,profit,profitPct:actual>0?(profit/actual)*100:0};
}

// ── Render calc ──
function renderOutcomes(){
  const list=document.getElementById('outcomesList');
  list.innerHTML='';
  const res=calculate();const lit=!!(res&&res.isSurebet);
  outcomes.forEach((o,idx)=>{
    const row=document.createElement('div');row.className='or';
    row.innerHTML=`
      <input type="text" placeholder="Casa ${idx+1}" value="${esc(o.house)}" data-field="house" data-id="${o.id}">
      <input type="text" placeholder="Resultado" value="${esc(o.result)}" data-field="result" data-id="${o.id}">
      <input type="number" class="oi${lit?' lit':''}" placeholder="1,00" value="${o.odd>0?o.odd:''}" data-field="odd" data-id="${o.id}" min="1.01" step="0.01">
      <button class="bd" data-id="${o.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`;
    list.appendChild(row);
  });
}

function renderResult(){
  const panel=document.getElementById('resultPanel');
  const res=calculate();
  if(!res){panel.innerHTML=`<div class="card"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>Añade al menos 2 cuotas &gt; 1,00.</p></div></div>`;return;}
  const{isSurebet,stakes,returns,minReturn,actualTotal,profit,profitPct,sumPct,valid}=res;
  const s=profit>=0?'+':'';
  const badgeHtml=isSurebet?`<div class="badge bg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Surebet</div>`:
    `<div class="badge br"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Sin surebet</div>`;
  const bkHtml=valid.map((o,i)=>`<div class="bkr"><div><div class="bkn">${esc(o.house||`Casa ${i+1}`)}</div><div class="bks">${esc(o.result||`Resultado ${i+1}`)} · Cuota ${fmt(o.odd)}</div></div><div class="bkv"><div class="bkst">${fmt(stakes[i])} €</div><div class="bkr2">retorno ${fmt(returns[i])} €</div><div class="bkm">mín. ${fmt(returns[i])} €</div></div></div>`).join('');
  const bW=Math.min(sumPct/1.3,100);
  panel.innerHTML=`
    <div class="card ph2 ${isSurebet?'sb':''}">${badgeHtml}<div class="pp ${profit>=0?'pos':'neg'}">${s}${fmt(profitPct)} %</div><div class="ps">Beneficio garantizado: <span class="hi ${profit>=0?'pos':'neg'}">${s}${fmt(profit)} €</span></div></div>
    <div class="card">${bkHtml}
      <div class="sr"><span class="sl">Inversión total</span><span class="sv">${fmt(actualTotal)} €</span></div>
      <div class="sr"><span class="sl">Retorno mínimo</span><span class="sv ${profit>=0?'pos':'neg'}">${fmt(minReturn)} €</span></div>
      <div class="sr"><span class="sl">Beneficio</span><span class="sv ${profit>=0?'pos':'neg'}">${s}${fmt(profit)} €</span></div>
      <div class="pw"><div class="pl"><span>Suma prob. implícitas</span><span>${fmt(sumPct)} %</span></div><div class="pt"><div class="pf ${sumPct>100?'over':''}" style="width:${bW}%"></div></div></div>
    </div>
    <button class="btn-reg" id="regBtn" ${!isSurebet?'disabled':''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>${isSurebet?'Registrar esta surebet':'Sin surebet — no disponible'}</button>`;
  document.getElementById('regBtn').addEventListener('click',registerBet);
}

function render(){renderOutcomes();renderResult();}

function registerBet(){
  const res=calculate();if(!res||!res.isSurebet)return;
  const ev=prompt('Nombre del evento:');if(!ev||!ev.trim())return;
  const dateVal=new Date().toISOString().slice(0,10);
  const bet={id:Date.now(),event:ev.trim(),date:dateVal,profitPct:res.profitPct,profit:res.profit,
    totalStake:res.actualTotal,minReturn:res.minReturn,status:'pending',
    legs:res.valid.map((o,i)=>({house:o.house||`Casa ${i+1}`,result:o.result||`Resultado ${i+1}`,odd:o.odd,stake:res.stakes[i],minReturn:res.returns[i]}))};
  D.bets.unshift(bet);save();updateBadges();
  alert(`✓ Surebet registrada: ${ev}\nBeneficio esperado: +${fmt(res.profit)} €`);
}

function renderSurebets(filter=''){
  const bets=D.bets.filter(b=>!filter||b.event.toLowerCase().includes(filter.toLowerCase())||b.legs.some(l=>l.house&&l.house.toLowerCase().includes(filter.toLowerCase())));
  const won=D.bets.filter(b=>b.status==='won'),lost=D.bets.filter(b=>b.status==='lost');
  const wonProfit=won.reduce((a,b)=>a+(b.profit||0),0);
  document.getElementById('sbStats').innerHTML=`
    <div class="sc"><div class="sl2">Total surebets</div><div class="sv2">${D.bets.length}</div></div>
    <div class="sc"><div class="sl2">Ganadas</div><div class="sv2 pos">${won.length}</div></div>
    <div class="sc"><div class="sl2">Pendientes</div><div class="sv2 yel">${D.bets.filter(b=>b.status==='pending').length}</div></div>
    <div class="sc"><div class="sl2">Profit surebets</div><div class="sv2 ${wonProfit>=0?'pos':'neg'}">${wonProfit>=0?'+':''}${fmt(wonProfit)} €</div></div>`;
  const list=document.getElementById('sbList');
  if(!bets.length){list.innerHTML=`<div class="card"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No hay surebets registradas.</p></div></div>`;return;}
  list.innerHTML=bets.map(b=>{
    const s=b.profitPct>=0?'+':'';
    const sLabel={pending:'Pendiente',won:'Ganada',lost:'Perdida'}[b.status]||b.status;
    const sCls={pending:'sp',won:'sw',lost:'sl3'}[b.status]||'';
    const hasLegs=b.legs&&b.legs.length;
    const winnerIdx=b.winnerLeg!=null?b.winnerLeg:-1;
    const realProfit=winnerIdx>=0&&hasLegs?((b.legs[winnerIdx].minReturn||0)-(b.totalStake||0)):null;
    const displayProfit=realProfit!=null?realProfit:b.profit;
    const displayProfitPct=realProfit!=null&&(b.totalStake||0)>0?(realProfit/(b.totalStake||1))*100:b.profitPct;
    const legsHtml=hasLegs?`<div style="background:var(--raised);display:grid;grid-template-columns:1fr 1fr auto auto auto auto;gap:5px 10px;padding:5px 15px;font-size:10px;color:var(--faint)"><span>CASA</span><span>RESULTADO</span><span style="text-align:right">CUOTA</span><span style="text-align:right">STAKE</span><span style="text-align:right">RETORNO</span><span></span></div>`+
      b.legs.map((l,li)=>`<div class="leg${winnerIdx===li?' leg-winner':''}"><span class="lh">${esc(l.house)}</span><span class="lr">${esc(l.result)}</span><span class="lo">${fmt(l.odd||0)}</span><span class="lk">${fmt(l.stake||0)} €</span><span class="lm">${fmt(l.minReturn||0)} €</span><button class="win-btn${winnerIdx===li?' selected':''}" data-wbid="${b.id}" data-wleg="${li}" title="Marcar como ganadora">${winnerIdx===li?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Ganó`:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Ganó`}</button></div>`).join('')+
      (winnerIdx>=0?`<div class="real-profit-row"><span class="real-profit-label">✓ Ganó ${esc(b.legs[winnerIdx].house)} — Profit real</span><span class="real-profit-val">+${fmt(realProfit)} €</span></div>`:'')
    : `<div style="padding:8px 15px;font-size:12px;color:var(--faint)">Sin desglose de patas (surebet pre-cargada)</div>`;
    return`<div class="bi"><div class="bih"><div><div class="bie">${esc(b.event)}</div><div class="bid">${fmtDate(b.date)}</div></div><div class="bim"><span class="pp2 ${displayProfitPct>=0?'pos':'neg'}">${displayProfitPct>=0?'+':''}${fmt(displayProfitPct)} %</span><span class="sb2 ${sCls}">${sLabel}</span><select class="ss" data-sid="${b.id}"><option value="pending" ${b.status==='pending'?'selected':''}>Pendiente</option><option value="won" ${b.status==='won'?'selected':''}>Ganada</option><option value="lost" ${b.status==='lost'?'selected':''}>Perdida</option></select><button class="bd2" data-bid="${b.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div></div><div class="bl">${legsHtml}</div><div class="bf"><span class="bfl">Invertido: ${fmt(b.totalStake||0)} € · Ret. mín.: ${fmt(b.minReturn||0)} €</span><span class="bfr ${displayProfit>=0?'pos':'neg'}">${displayProfit>=0?'+':''}${fmt(displayProfit)} €</span></div></div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  PROFIT PAGE
// ══════════════════════════════════════════
function renderProfit(){
  // Combine all entries with dates
  const all=[];
  D.bets.forEach(b=>{if(b.date&&b.profit!==undefined)all.push({date:b.date,profit:b.profit,cat:'surebet'})});
  D.normals.forEach(n=>{if(n.date&&n.profit!==undefined&&n.profit!==0)all.push({date:n.date,profit:n.profit,cat:n.type==='Freebet'?'freebet':'normal'})});

  // Group by month
  const months={};
  all.forEach(e=>{
    const m=e.date.slice(0,7);
    if(!months[m])months[m]={surebet:0,normal:0,freebet:0};
    months[m][e.cat]+=e.profit;
  });

  const keys=Object.keys(months).sort();
  const totalAll=Object.values(months).reduce((a,m)=>a+m.surebet+m.normal+m.freebet,0);
  const totalSB=D.bets.reduce((a,b)=>a+(b.profit||0),0);
  const totalNorm=D.normals.filter(n=>n.type==='Normal').reduce((a,n)=>a+(n.profit||0),0);
  const totalFB=D.normals.filter(n=>n.type==='Freebet').reduce((a,n)=>a+(n.profit||0),0);

  const monthNames={'2026-06':'Junio 2026','2026-07':'Julio 2026','2026-05':'Mayo 2026','2025-12':'Diciembre 2025'};
  function mName(k){return monthNames[k]||k}

  document.getElementById('totalHero').innerHTML=`
    <div class="total-hero">
      <div class="th-label">Profit Total</div>
      <div class="th-val ${totalAll>=0?'pos':'neg'}">${totalAll>=0?'+':''}${fmt(totalAll)} €</div>
      <div class="th-sub">
        <div class="th-sub-item"><div class="th-sub-label">Surebets</div><div class="th-sub-val" style="color:var(--green)">${totalSB>=0?'+':''}${fmt(totalSB)} €</div></div>
        <div class="th-sub-item"><div class="th-sub-label">Normales</div><div class="th-sub-val" style="color:${totalNorm>=0?'var(--blue)':'var(--red)'}">${totalNorm>=0?'+':''}${fmt(totalNorm)} €</div></div>
        <div class="th-sub-item"><div class="th-sub-label">Freebets</div><div class="th-sub-val" style="color:var(--yellow)">${totalFB>=0?'+':''}${fmt(totalFB)} €</div></div>
      </div>
    </div>`;

  document.getElementById('monthList').innerHTML=keys.reverse().map(k=>{
    const m=months[k];const tot=m.surebet+m.normal+m.freebet;
    return`<div class="month-card">
      <div class="mc-head"><span class="mc-month">${mName(k)}</span><span class="mc-total ${tot>=0?'pos':'neg'}">${tot>=0?'+':''}${fmt(tot)} €</span></div>
      ${m.surebet!==0?`<div class="mc-row"><span class="mc-cat">Surebets</span><span class="mc-val ${m.surebet>=0?'pos':'neg'}">${m.surebet>=0?'+':''}${fmt(m.surebet)} €</span></div>`:''}
      ${m.normal!==0?`<div class="mc-row"><span class="mc-cat">Normales</span><span class="mc-val ${m.normal>=0?'pos':'neg'}">${m.normal>=0?'+':''}${fmt(m.normal)} €</span></div>`:''}
      ${m.freebet!==0?`<div class="mc-row"><span class="mc-cat">Freebets</span><span class="mc-val ${m.freebet>=0?'pos':'neg'}">${m.freebet>=0?'+':''}${fmt(m.freebet)} €</span></div>`:''}
    </div>`;
  }).join('');
}

document.getElementById('outcomesList').addEventListener('input',e=>{
  const el=e.target,id=+el.dataset.id,field=el.dataset.field;
  if(!id||!field)return;const o=outcomes.find(x=>x.id===id);if(!o)return;
  if(field==='odd')o.odd=parseFloat(el.value)||0;else o[field]=el.value;
  renderResult();
  const res=calculate();document.querySelectorAll('.oi').forEach(i=>i.classList.toggle('lit',!!(res&&res.isSurebet)));
});
document.getElementById('outcomesList').addEventListener('click',e=>{
  const btn=e.target.closest('.bd');if(!btn||outcomes.length<=2)return;
  outcomes=outcomes.filter(o=>o.id!==+btn.dataset.id);render();
});
document.getElementById('addBtn').addEventListener('click',()=>{
  outcomes.push({id:nextId++,house:'',result:'',odd:0});render();
  setTimeout(()=>{const ins=document.querySelectorAll('.oi');if(ins.length)ins[ins.length-1].focus();},40);
});
document.getElementById('totalInv').addEventListener('input',e=>{totalInv=parseFloat(e.target.value)||0;renderResult();});
document.getElementById('roundPills').addEventListener('click',e=>{
  const btn=e.target.closest('.rpb');if(!btn)return;
  roundMode=btn.dataset.mode;
  document.querySelectorAll('.rpb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('customRow').style.display=roundMode==='custom'?'flex':'none';
  renderResult();
});
document.getElementById('customStep').addEventListener('input',e=>{customStep=parseFloat(e.target.value)||0.1;if(roundMode==='custom')renderResult();});

// Surebets page events
document.getElementById('sbSearch').addEventListener('input',e=>renderSurebets(e.target.value));
document.getElementById('sbList').addEventListener('change',e=>{
  const sel=e.target.closest('[data-sid]');if(!sel)return;
  const b=D.bets.find(x=>x.id===+sel.dataset.sid);if(!b)return;
  b.status=sel.value;save();renderSurebets(document.getElementById('sbSearch').value);renderProfit();
});
document.getElementById('sbList').addEventListener('click',e=>{
  // Winner leg selection
  const winBtn=e.target.closest('[data-wbid]');
  if(winBtn){
    const bid=+winBtn.dataset.wbid,li=+winBtn.dataset.wleg;
    const b=D.bets.find(x=>x.id===bid);if(!b)return;
    // Toggle: click same leg again to deselect
    if(b.winnerLeg===li){
      delete b.winnerLeg;
      b.profit=b.minReturn-(b.totalStake||0);
    } else {
      b.winnerLeg=li;
      b.profit=(b.legs[li].minReturn||0)-(b.totalStake||0);
    }
    save();renderSurebets(document.getElementById('sbSearch').value);renderProfit();
    return;
  }
  // Delete button
  const btn=e.target.closest('[data-bid]');if(!btn)return;
  if(!confirm('¿Eliminar esta surebet?'))return;
  D.bets=D.bets.filter(b=>b.id!==+btn.dataset.bid);save();updateBadges();
  renderSurebets(document.getElementById('sbSearch').value);renderProfit();
});
document.getElementById('sbExport').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify({bets:D.bets,normals:D.normals},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`surebets_${new Date().toISOString().slice(0,10)}.json`;a.click();
});
document.getElementById('sbImport').addEventListener('click',()=>document.getElementById('sbFile').click());
document.getElementById('sbFile').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{
    try{const p=JSON.parse(ev.target.result);
    if(!confirm(`Importar ${(p.bets||[]).length} surebets y ${(p.normals||[]).length} normales?`))return;
    const existS=new Set(D.bets.map(b=>b.id)),existN=new Set(D.normals.map(n=>n.id));
    D.bets=[...(p.bets||[]).filter(b=>!existS.has(b.id)),...D.bets];
    D.normals=[...(p.normals||[]).filter(n=>!existN.has(n.id)),...D.normals];
    save();updateBadges();renderSurebets();renderNormals();renderProfit();alert('Importado correctamente.');}
    catch(err){alert('Error: '+err.message);}
  };r.readAsText(file);e.target.value='';
});
document.getElementById('sbClear').addEventListener('click',()=>{
  if(!confirm('¿Borrar TODAS las surebets? Esto no se puede deshacer.'))return;
  D.bets=[];save();updateBadges();renderSurebets();renderProfit();
});

// Normales page events
document.getElementById('nbSearch').addEventListener('input',e=>renderNormals(e.target.value));
document.getElementById('nbList').addEventListener('click',e=>{
  const btn=e.target.closest('[data-nid]');if(!btn)return;
  if(!confirm('¿Eliminar esta entrada?'))return;
  D.normals=D.normals.filter(n=>n.id!==+btn.dataset.nid);save();updateBadges();

const modal=document.getElementById('addModal');
document.getElementById('nbAddBtn').addEventListener('click',()=>{
  document.getElementById('m-date').value=new Date().toISOString().slice(0,10);
  modal.style.display='flex';
});
document.getElementById('m-cancel').addEventListener('click',()=>{modal.style.display='none';});
document.getElementById('m-save').addEventListener('click',()=>{
  const ev=document.getElementById('m-event').value.trim();
  if(!ev){alert('Introduce el evento.');return;}
  const n={id:Date.now(),event:ev,type:document.getElementById('m-type').value,
    profit:parseFloat(document.getElementById('m-profit').value)||0,
    date:document.getElementById('m-date').value,
    notes:document.getElementById('m-notes').value.trim()};
  D.normals.unshift(n);save();updateBadges();
  renderNormals(document.getElementById('nbSearch').value);renderProfit();
  modal.style.display='none';
  ['m-event','m-profit','m-notes'].forEach(id=>document.getElementById(id).value='');
});

// ══════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════
const pgMeta={
  calc:{title:'Calculadora',sub:'Calcula stakes y surebets al instante'},
  surebets:{title:'Mis surebets',sub:'Historial completo con retorno mínimo'},
  normales:{title:'Normales & Freebets',sub:'Apuestas estándar y freebets por tipo y fecha'},
  profit:{title:'Profit',sub:'Rendimiento por mes y total acumulado'},
};
document.querySelectorAll('.ni[data-page]').forEach(item=>{
  item.addEventListener('click',()=>{
    const page=item.dataset.page;
    document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));item.classList.add('active');
    ['calc','surebets','normales','profit'].forEach(p=>{
      const el=document.getElementById('page-'+p);if(el)el.style.display='none';
    });
    const target=document.getElementById('page-'+page);
    if(target)target.style.display=page==='calc'?'contents':'flex';
    document.getElementById('pgTitle').textContent=pgMeta[page].title;
    document.getElementById('pgSub').textContent=pgMeta[page].sub;
    if(page==='calc')render();
    else if(page==='surebets')renderSurebets();
    else if(page==='normales')renderNormals();
    else if(page==='profit')renderProfit();
    if(window.innerWidth<600)closeSB();
  });
});

function updateBadges(){
  document.getElementById('sbCount').textContent=D.bets.length;
  document.getElementById('nbCount').textContent=D.normals.length;
}

// ── Mobile sidebar ──
const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('sbOverlay');
function openSB(){sidebar.classList.add('open');overlay.classList.add('open')}
function closeSB(){sidebar.classList.remove('open');overlay.classList.remove('open')}
document.getElementById('sbToggle').addEventListener('click',()=>sidebar.classList.contains('open')?closeSB():openSB());
overlay.addEventListener('click',closeSB);

// ══════════════════════════════════════════
//  FIREBASE — Auth + Firestore sync
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

let docRef = null;
let unsubscribeSnapshot = null;
let suppressNextSnapshot = false;
let firestoreReady = false;

const authScreen = document.getElementById('authScreen');
const appRoot = document.getElementById('appRoot');
const authStatus = document.getElementById('authStatus');
const googleLoginBtn = document.getElementById('googleLoginBtn');

(async () => {
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js');
  const { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } =
    await import('https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js');
  const { getFirestore, doc, getDoc, setDoc, onSnapshot } =
    await import('https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js');

  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const dbFs = getFirestore(fbApp);
  const provider = new GoogleAuthProvider();

  googleLoginBtn.addEventListener('click', async () => {
    authStatus.textContent = 'Conectando…';
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      authStatus.textContent = 'Error al iniciar sesión. Inténtalo de nuevo.';
      console.error(e);
    }
  });

  async function bootApp() {
    const LOCAL_STORE_KEY = 'sb_v3';
    const snap = await getDoc(docRef);

    if (snap.exists()) {
      D = snap.data();
      if (!Array.isArray(D.bets)) D.bets = [];
      if (!Array.isArray(D.normals)) D.normals = [];
    } else {
      let migrated = null;
      try {
        const raw = localStorage.getItem(LOCAL_STORE_KEY);
        if (raw) migrated = JSON.parse(raw);
      } catch (e) {}
      D = migrated || { bets: [], normals: [] };
      if (!Array.isArray(D.bets)) D.bets = [];
      if (!Array.isArray(D.normals)) D.normals = [];
      if (D.bets.length === 0) D.bets = EXCEL_SUREBETS.map(b => ({ ...b }));
      if (D.normals.length === 0) D.normals = EXCEL_NORMALS.map(n => ({ ...n }));
      await setDoc(docRef, D);
    }

    try { localStorage.removeItem(LOCAL_STORE_KEY); } catch (e) {}

    firestoreReady = true;

    unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
      if (suppressNextSnapshot) { suppressNextSnapshot = false; return; }
      if (!docSnap.exists()) return;
      D = docSnap.data();
      if (!Array.isArray(D.bets)) D.bets = [];
      if (!Array.isArray(D.normals)) D.normals = [];
      refreshCurrentView();
    });

    updateBadges();
    render();
  }

  function refreshCurrentView() {
    updateBadges();
    const activePage = document.querySelector('.ni.active')?.dataset.page || 'calc';
    if (activePage === 'calc') render();
    else if (activePage === 'surebets') renderSurebets(document.getElementById('sbSearch')?.value || '');
    else if (activePage === 'normales') renderNormals(document.getElementById('nbSearch')?.value || '');
    else if (activePage === 'profit') renderProfit();
  }

  window.__fsSave = async function () {
    if (!firestoreReady || !docRef) return;
    suppressNextSnapshot = true;
    try {
      await setDoc(docRef, D);
    } catch (e) {
      console.error('Error guardando en Firestore', e);
    }
  };

  onAuthStateChanged(auth, async (user) => {
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
    if (user) {
      docRef = doc(dbFs, 'users', user.uid, 'app', 'data');
      authStatus.textContent = 'Sincronizando datos…';
      await bootApp();
      authScreen.classList.add('hidden');
      appRoot.classList.add('ready');
    } else {
      docRef = null;
      firestoreReady = false;
      appRoot.classList.remove('ready');
      authScreen.classList.remove('hidden');
      authStatus.textContent = '';
    }
  });
})();
</script>
</body>
</html>
